name: Daily arXiv Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run daily at 06:00 UTC — after arXiv's nightly announcement (~05:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      today_mode:
        description: 'Fetch ALL CS papers published today on arXiv (true/false)'
        required: false
        default: 'true'
      today_max:
        description: 'Max papers in today-mode (default 2000)'
        required: false
        default: '2000'
      skip_acl:
        description: 'Skip ACL Anthology fetch (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run arXiv + ACL pipeline
        env:
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY_MODE="${{ github.event.inputs.today_mode || 'true' }}"
          TODAY_MAX="${{ github.event.inputs.today_max || '2000' }}"
          SKIP_ACL="${{ github.event.inputs.skip_acl || 'false' }}"

          FLAGS="--skip-conferences"   # conferences are synced separately (monthly)
          if [ "$TODAY_MODE" = "true" ]; then
            FLAGS="$FLAGS --today --today-max $TODAY_MAX"
          fi
          if [ "$SKIP_ACL" = "true" ]; then
            FLAGS="$FLAGS --skip-acl"
          fi

          echo "Running: python src/pipeline.py $FLAGS"
          python src/pipeline.py $FLAGS

      - name: Verify output
        run: |
          python -c "
          import json
          papers = json.load(open('site/data/papers.json'))
          print(f'{len(papers)} papers in frontend slice')
          db = json.load(open('site/data/papers_db.json'))
          print(f'{len(db)} papers in DB')
          "

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/
          git diff --cached --quiet || git commit -m "chore: daily arXiv update [$(date -u +%Y-%m-%d)]" && git push || true

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
