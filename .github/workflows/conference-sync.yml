name: Monthly Conference Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Conferences publish once a year — syncing monthly is more than enough.
# Papers accumulate in papers_db.json and persist across daily arXiv runs.

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of every month at 08:00 UTC
  workflow_dispatch:
    inputs:
      max_results:
        description: 'Max papers per query for S2 only (AAAI/IJCAI/CHI). OpenReview/PMLR/CVF/ACL always fetch ALL papers regardless of this value.'
        required: false
        default: '500'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  conference-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Sync conference papers (S2 + OpenReview)
        env:
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENREVIEW_EMAIL: ${{ secrets.OPENREVIEW_EMAIL }}
          OPENREVIEW_PASSWORD: ${{ secrets.OPENREVIEW_PASSWORD }}
        run: |
          MAX="${{ github.event.inputs.max_results || '500' }}"
          echo "Running: python src/pipeline.py --conferences-only --max-results $MAX"
          python src/pipeline.py --conferences-only --max-results $MAX

      - name: Report results
        run: |
          python -c "
          import json
          cdb = json.load(open('site/data/conferences_db.json'))
          venues = {}
          for p in cdb:
            v = p.get('venue', 'unknown')
            venues[v] = venues.get(v, 0) + 1
          print(f'Conference papers in conferences_db.json: {len(cdb)}')
          for v, n in sorted(venues.items(), key=lambda x: -x[1]):
            print(f'  {v}: {n}')
          arxiv_db = json.load(open('site/data/papers_db.json'))
          print(f'arXiv papers in papers_db.json: {len(arxiv_db)}')
          "

      - name: Commit updated data
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: monthly conference sync [$(date -u +%Y-%m)]"
            for i in 1 2 3; do
              git push origin main && break
              echo "Push attempt $i failed, retrying with rebase (theirs)…"
              # Use -X theirs so the conference sync data wins over any
              # concurrent daily arXiv commit — conference data is the superset.
              git pull --rebase --autostash -X theirs origin main
              sleep 5
            done
          fi

  deploy:
    needs: conference-sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
