# Topic taxonomy for ResearchScope.
# Each topic has:
#   - keywords: matched against title+abstract (case-insensitive)
#   - difficulty: L1 | L2 | L3 | L4
#   - prerequisites: list of topic IDs
#   - paper_types: typical paper types in this topic

topics:
  llms:
    name: "Large Language Models"
    keywords:
      - large language model
      - llm
      - gpt
      - chatgpt
      - instruction tuning
      - chat model
      - language model alignment
      - constitutional ai
    difficulty: L2
    prerequisites: [transformers, nlp_basics]
    paper_types: [methods, benchmark, empirical, survey]

  transformers:
