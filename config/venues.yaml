# Conference and venue rankings for ResearchScope.
# rank: A* (top-tier), A (excellent), B (good), C (acceptable)
# Used to set conference_rank on papers and weight quality_hint_score.

venues:
  # NLP / CL
  - id: acl
    name: "Annual Meeting of the Association for Computational Linguistics"
    short: ACL
    rank: "A*"
    area: NLP
    source: acl_anthology

  - id: emnlp
    name: "Conference on Empirical Methods in Natural Language Processing"
    short: EMNLP
    rank: "A*"
